name: Release Build

run-name: Release ${{ github.ref_name }} (${{ github.event.head_commit.timestamp }})

on:
  # ! 为了避免重复发布版本，应当通过独特 git tag 触发。
  # ! 不再使用 workflow_dispatch 触发。
  # workflow_dispatch:
  push:
    # -rc tag 时预览发布, 跳过 telegram 通知、跳过 winget 提交、跳过 latest.json 文件更新
    tags:
      - 'v*.*.*'
permissions: write-all
env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short
  HUSKY: 0
concurrency:
  # only allow per workflow per commit (and not pr) to run at a time
  group: '${{ github.workflow }} - ${{ github.head_ref || github.ref }}'
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  check_tag_version:
    name: Check Release Tag and package.json Version Consistency
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check if tag is from main branch
        run: |
          TAG_REF="${GITHUB_REF##*/}"
          echo "Checking if tag $TAG_REF is from main branch..."

          TAG_COMMIT=$(git rev-list -n 1 $TAG_REF)
          MAIN_COMMITS=$(git rev-list origin/main)

          if echo "$MAIN_COMMITS" | grep -q "$TAG_COMMIT"; then
            echo "✅ Tag $TAG_REF is from main branch"
          else
            echo "❌ Tag $TAG_REF is not from main branch"
            echo "This release workflow only accepts tags from main branch."
            exit 1
          fi

      - name: Check tag and package.json version
        run: |
          TAG_REF="${GITHUB_REF_NAME:-${GITHUB_REF##*/}}"
          echo "Current tag: $TAG_REF"

          PKG_VERSION=$(jq -r .version package.json)
          echo "package.json version: $PKG_VERSION"

          EXPECTED_TAG="v$PKG_VERSION"

          if [[ "$TAG_REF" != "$EXPECTED_TAG" ]]; then
            echo "❌ Version mismatch:"
            echo "   Git tag       : $TAG_REF"
            echo "   package.json  : $EXPECTED_TAG"
            exit 1
          fi

          echo "✅ Tag and package.json version are consistent."

  prepare_release:
    name: Prepare Draft Release
    runs-on: ubuntu-latest
    needs: [check_tag_version]
    outputs:
      release_id: ${{ steps.prepare_release.outputs.id }}
    steps:
      - name: Create or update draft release
        id: prepare_release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          target_commitish: ${{ github.sha }}
          name: 'Clash Verge Rev ${{ github.ref_name }}'
          body: 'Draft release, will be updated later.'
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: true
          prerelease: ${{ contains(github.ref_name, '-rc') }}

  update_tag:
    name: Update tag
    runs-on: ubuntu-latest
    needs:
      [
        prepare_release,
        release,
      ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Fetch UPDATE logs
        id: fetch_update_logs
        run: bash ./scripts/extract_update_logs.sh
        shell: bash

      - name: Set Env
        run: |
          echo "BUILDTIME=$(TZ=America/Los_Angeles date)" >> $GITHUB_ENV
          TAG_REF="${GITHUB_REF##*/}"
          echo "TAG_NAME=$TAG_REF" >> $GITHUB_ENV
          VERSION=$(echo "$TAG_REF" | sed 's/^v//')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "DOWNLOAD_URL=https://github.com/TWO666/clash-verge-rev/releases/download/$TAG_REF" >> $GITHUB_ENV
        shell: bash

      - run: |
          cat > release.txt << EOF
          ## !!! Fork Changes !!!
          - Bundles a mihomo core built with \`GOAMD64=v3\`
          - Modified \`deep_merge\` behavior: keys such as \`nameserver-policy\` are replaced as a whole instead of being merged element by element
          - Builds \`x64\` only (exe and deb)

          ## ⚠️ Disclaimer ⚠️

          - This is an **unofficial** build. Please make sure you pick the correct installer for your platform. For any issue related to **this fork specifically**, please report it in the Issues section of **this** repository, not upstream.
          - The build artifacts are provided **for testing purposes only**. This fork comes with no warranty and accepts no liability for any consequences arising from its use.

          ## Downloads

          ### Windows (Win7 no longer supported)
          #### Standard build (recommended)
          - [x64 (common)](${{ env.DOWNLOAD_URL }}/Clash.Verge_${{ env.VERSION }}_x64-setup.exe)

          ### Linux
          #### DEB package (Debian-based) — install with \`apt install ./<path>\`
          - [x64](${{ env.DOWNLOAD_URL }}/Clash.Verge_${{ env.VERSION }}_amd64.deb)


          Created at ${{ env.BUILDTIME }}.
          EOF

      - name: Publish Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRERELEASE: ${{ contains(github.ref_name, '-rc') }}
        run: |
          release_id="${{ needs.prepare_release.outputs.release_id }}"

          if [ -z "$release_id" ]; then
            echo "::error::No prepared release ID found for $TAG_NAME."
            exit 1
          fi

          release_info=$(gh api repos/{owner}/{repo}/releases/"$release_id" --jq '[.tag_name, .draft, (.assets | length), .html_url] | @tsv')
          IFS=$'\t' read -r release_tag _ asset_count release_url <<< "$release_info"

          if [ "$release_tag" != "$TAG_NAME" ]; then
            echo "::error::Prepared release $release_id belongs to $release_tag, expected $TAG_NAME."
            exit 1
          fi

          echo "Publishing release $release_id ($release_url) with $asset_count assets."

          gh api --method PATCH repos/{owner}/{repo}/releases/"$release_id" \
            -f name="Clash Verge Rev $TAG_NAME" \
            -F body=@release.txt \
            -F draft=false \
            -F prerelease="$PRERELEASE" \
            --silent

  release:
    name: Release Build
    needs: [prepare_release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.96.1'
          targets: ${{ matrix.target }}

      - name: Add Rust Target
        run: rustup target add ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/dev' }}
          prefix-key: 'v1-rust'
          key: 'rust-shared-stable-${{ matrix.os }}-${{ matrix.target }}'
          workspaces: |
            . -> target
          cache-all-crates: true
          cache-workspace-crates: true

      - name: Install dependencies (ubuntu only)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxslt1.1 libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: '24.18.0'

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          run_install: false

      - name: Pnpm install and check
        run: |
          pnpm i
          pnpm run prebuild ${{ matrix.target }}

      - name: Add Rust Target
        run: |
          rustup target add ${{ matrix.target }}
          rustup target list --installed
          echo "Rust target ${{ matrix.target }} installed."

      - name: Tauri build
        uses: tauri-apps/tauri-action@v1.0.0
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.prepare_release.outputs.release_id }}
          tagName: ${{ github.ref_name }}
          releaseBody: 'Draft release, will be updated later.'
          tauriScript: pnpm
          args: --target ${{ matrix.target }}
          uploadUpdaterJson: true

      - name: Attest Windows bundles
        if: matrix.os == 'windows-latest'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: target/${{ matrix.target }}/release/bundle/nsis/*setup*

      - name: Attest Linux bundles
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            target/${{ matrix.target }}/release/bundle/deb/*.deb

  release-update:
    if: ${{ !contains(github.ref_name, '-rc') }}
    name: Release Update
    runs-on: ubuntu-latest
    needs: [update_tag]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: '24.18.0'

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          run_install: false

      - name: Pnpm install
        run: pnpm i

      - name: Release updater file
        run: pnpm updater
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}